<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Frya AI | By OpenDluz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css" />
</head>

<body>
  <div id="app">
    <header class="header">
      <div class="logo">
        <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"
          stroke-linecap="round" stroke-linejoin="round" class="css-i6dzq1">
          <polygon points="12 2 2 7 12 12 22 7 12 2"></polygon>
          <polyline points="2 17 12 22 22 17"></polyline>
          <polyline points="2 12 12 17 22 12"></polyline>
        </svg>
        <h1>Frya AI V2</h1>
      </div>
      <div class="header-actions">
        <button id="toggle-tasks-btn" class="icon-btn" title="Tarefas Agendadas">
          <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"
            stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
            <line x1="16" y1="2" x2="16" y2="6"></line>
            <line x1="8" y1="2" x2="8" y2="6"></line>
            <line x1="3" y1="10" x2="21" y2="10"></line>
          </svg>
        </button>
        <div class="status">
          <span class="dot"></span> Online Local
        </div>
      </div>
    </header>

    <aside id="tasks-sidebar" class="sidebar hidden">
      <div class="sidebar-header">
        <h2>🕒 Agendador Avançado</h2>
        <button id="close-tasks-btn">&times;</button>
      </div>

      <div class="task-wizard">
        <h3>Nova Tarefa</h3>
        <div class="form-group">
          <label>O que a Frya deve fazer?</label>
          <textarea id="task-instruction" placeholder="Ex: Verificar e-mails e me avisar se houver novos."></textarea>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Frequência</label>
            <select id="task-freq">
              <option value="minutes">A cada X minutos</option>
              <option value="hourly">A cada X horas</option>
              <option value="daily">Diariamente (Horário fixo)</option>
              <option value="weekly">Semanalmente (Escolher dia)</option>
              <option value="cron">Custom (Cron Expression)</option>
            </select>
          </div>
          <div class="form-group">
            <label id="task-val-label">Intervalo (Minutos)</label>
            <input type="text" id="task-val" placeholder="15">
          </div>
        </div>
        <div id="cron-helper" class="cron-helper-text"></div>
        <div class="form-actions">
          <button id="create-task-btn" class="primary-btn">Agendar Agora</button>
          <button id="cancel-edit-btn" class="dark-btn hidden">Cancelar</button>
        </div>
      </div>

      <div class="tasks-list-container">
        <h3>Suas Tarefas</h3>
        <div id="tasks-list" class="tasks-list">
          <!-- Tarefas entram aqui via JS -->
          <p class="empty-list">Carregando tarefas...</p>
        </div>
      </div>
    </aside>

    <main class="chat-container">
      <div class="chat-messages" id="chat-messages">
        <!-- Mensagens entram aqui via JS -->
        <div class="message assistant welcome">
          <div class="message-bubble">
            Olá! Eu sou a <strong>Frya</strong>, sua agente pessoal de IA do Dluz Games! ✨
            <br />Como posso ajudar você hoje?
          </div>
        </div>
      </div>
    </main>

    <footer class="chat-input-area">
      <form id="chat-form">
        <div class="input-wrapper">
          <input type="text" id="message-input" placeholder="Digite sua mensagem aqui..." autocomplete="off">
          <button type="submit" id="send-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
          </button>
        </div>
      </form>
    </footer>
  </div>
  <script type="module" src="./main.js"></script>
</body>

</html>
